version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: hr_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: hr_db
      MYSQL_USER: hr_user
      MYSQL_PASSWORD: hr_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - hr_network

  redis:
    image: redis:7-alpine
    container_name: hr_redis
    ports:
      - "6379:6379"
    networks:
      - hr_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hr_backend
    environment:
      NODE_ENV: development
      DATABASE_URL: mysql://hr_user:hr_password@mysql:3306/hr_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your_jwt_secret_key_here
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      - mysql
      - redis
    volumes:
      - ./backend/src:/app/src
    networks:
      - hr_network
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hr_frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    networks:
      - hr_network
    command: npm start

volumes:
  mysql_data:

networks:
  hr_network:
    driver: bridge